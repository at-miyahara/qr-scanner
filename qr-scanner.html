<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコードスキャナ</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            /* モバイル向け動的ビューポート高さ */
            background: #f9f9f9;
            overflow: hidden;
        }

        h2 {
            text-align: center;
            font-size: 1.1rem;
            margin: 12px 0;
            flex-shrink: 0;
        }

        #qr-reader-container {
            flex: 1;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1; /* 正方形に近い画角を維持 */
            max-height: 60vh; /* 画面の高さに応じて制限 */
            margin: 0 auto;
            position: relative;
            background: #222;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* スキャンガイドのスタイル */
        .scan-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            aspect-ratio: 1 / 1;
            max-width: 280px;
            max-height: 280px;
            pointer-events: none;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-cross {
            position: relative;
            width: 24px;
            height: 24px;
            opacity: 0.8;
        }

        .center-cross::before,
        .center-cross::after {
            content: '';
            position: absolute;
            background: #fff;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
        }

        .center-cross::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }

        .center-cross::after {
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }

        .corner-guide {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.7);
            filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.5));
            animation: pulse-guide 2s infinite ease-in-out;
        }

        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 4px; }
        .top-right { top: 0; right: 0; border-left: none; border-bottom: none; border-top-right-radius: 4px; }
        .bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; border-bottom-left-radius: 4px; }
        .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 4px; }

        @keyframes pulse-guide {
            0% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1.0; transform: scale(1.02); }
            100% { opacity: 0.4; transform: scale(0.98); }
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #bottom-panel {
            background: #f9f9f9;
            padding: 12px 20px 24px;
            box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
            z-index: 1000;
        }

        #result {
            margin-top: 0;
            padding: 14px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 0.95rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        #close-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 12px auto 0;
            padding: 14px 32px;
            border-radius: 8px;
            border: none;
            background: #6b7280;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        #close-btn:hover {
            background: #4b5563;
        }
    </style>
</head>

<body>
    <h2>📷 QRコードスキャン</h2>
    <div id="qr-reader-container">
        <video id="video" autoplay playsinline></video>
        <div class="scan-guide">
            <div class="corner-guide top-left"></div>
            <div class="corner-guide top-right"></div>
            <div class="corner-guide bottom-left"></div>
            <div class="corner-guide bottom-right"></div>
            <div class="center-cross"></div>
        </div>
    </div>

    <div id="bottom-panel">
        <div id="result">カメラを起動中...</div>
        <button id="close-btn" onclick="window.close()">画面を閉じる</button>
    </div>

    <script type="module">
        import { BrowserMultiFormatReader } from "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm";

        const TARGET_ORIGIN = '*';
        const video = document.getElementById("video");
        const resultDiv = document.getElementById("result");
        
        let lastScannedId = null;
        let scanCooldown = false;
        let scannedItems = [];

        async function startScanner() {
            try {
                // カメラストリームの取得
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { ideal: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                video.srcObject = stream;

                // ズーム設定の試行
                const track = stream.getVideoTracks()[0];
                try {
                    const capabilities = track.getCapabilities();
                    if (capabilities.zoom) {
                        // 2.5倍、または可能な最大値を倍率として設定
                        const zoomValue = Math.min(2.5, capabilities.zoom.max);
                        await track.applyConstraints({
                            advanced: [{ zoom: zoomValue }]
                        });
                        console.log(`Zoom set to: ${zoomValue}`);
                    }
                } catch (e) {
                    console.warn("Zoom support check failed or not available:", e);
                }

                const codeReader = new BrowserMultiFormatReader();
                resultDiv.innerText = 'スキャン準備完了';

                // スキャンループの開始
                codeReader.decodeFromVideoElement(video, (result, err) => {
                    if (result) {
                        const decodedText = result.getText();
                        
                        // itemId を抽出 (URLパラメータまたはベタ打ちテキスト)
                        let itemId = null;
                        try {
                            itemId = new URL(decodedText).searchParams.get("item");
                        } catch (e) {
                            if (decodedText.indexOf('item=') !== -1) {
                                itemId = decodedText.split('item=')[1].split('&')[0];
                            } else {
                                itemId = decodedText.trim();
                            }
                        }

                        if (!itemId) return;

                        // 同一コードの連続検知抑制
                        if (scanCooldown && lastScannedId === itemId) return;

                        lastScannedId = itemId;
                        scanCooldown = true;
                        
                        // 1.5秒間は同一コードの通知を抑止
                        setTimeout(() => { scanCooldown = false; }, 1500);

                        // 既にこのセッションで読み取った履歴がある場合
                        if (scannedItems.includes(itemId)) {
                            resultDiv.style.background = '#fef08a'; // 黄色
                            resultDiv.innerText = '⚠️ 既に読み取り済みです: ' + itemId;
                            resetFeedback(itemId);
                            return;
                        }

                        // 新規読み取りの場合
                        scannedItems.push(itemId);
                        resultDiv.style.background = '#d1fae5'; // 緑色
                        resultDiv.innerText = '✅ 読み取り成功: ' + itemId;

                        // 親ウィンドウ（GAS）へ送信
                        if (window.opener) {
                            window.opener.postMessage(
                                { type: 'QR_SCANNED', itemId: itemId },
                                TARGET_ORIGIN
                            );
                        }

                        resetFeedback(itemId);
                    }
                });

            } catch (err) {
                console.error("Scanner startup failed:", err);
                resultDiv.style.background = '#fee2e2';
                resultDiv.innerText = '❌ カメラを起動できませんでした。ブラウザの設定を確認してください。';
            }
        }

        function resetFeedback(currentId) {
            setTimeout(() => {
                if (lastScannedId === currentId) {
                    resultDiv.style.background = '#fff';
                    resultDiv.innerText = '次のQRコードをかざしてください...';
                }
            }, 3000);
        }

        // 初期化実行
        startScanner();
    </script>
</body>

</html>
