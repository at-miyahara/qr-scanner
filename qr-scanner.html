<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRスキャン</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* モバイル向け動的ビューポート高さ */
            background: #f9f9f9;
            overflow: hidden;
        }

        h2 {
            text-align: center;
            font-size: 1.1rem;
            margin: 12px 0;
            flex-shrink: 0;
        }

        #qr-reader {
            flex: 1;
            width: 100% !important;
            max-width: 400px;
            margin: 0 auto !important;
            border: none !important;
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        /* ライブラリが生成するビデオ要素を画面に合わせてフィットさせる */
        #qr-reader video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        #bottom-panel {
            background: #f9f9f9;
            padding: 12px 20px 24px;
            box-sizing: border-box;
            box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
            z-index: 1000;
        }

        #result {
            margin-top: 0;
            padding: 14px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 0.95rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        #close-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 12px auto 0;
            padding: 14px 32px;
            border-radius: 8px;
            border: none;
            background: #6b7280;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        #close-btn:hover {
            background: #4b5563;
        }
    </style>
</head>

<body>
    <h2>📷 QRコードスキャン</h2>
    <div id="qr-reader"></div>

    <div id="bottom-panel">
        <div id="result">カメラを起動中...</div>
        <button id="close-btn" onclick="window.close()">画面を閉じる</button>
    </div>

    <script>
        // GASのWebアプリはiframe内 (*.googleusercontent.com) で動くため
        // postMessage の targetOrigin は '*' にする。
        const TARGET_ORIGIN = '*';

        const html5Qrcode = new Html5Qrcode("qr-reader");
        let lastScannedId = null;
        let scanCooldown = false;
        let scannedItems = [];

        Html5Qrcode.getCameras()
            .then(cameras => {
                if (!cameras || cameras.length === 0) {
                    document.getElementById('result').innerText = '❌ カメラが見つかりません';
                    return;
                }

                // qrbox を画面サイズに合わせて動的に計算（幅の70%）
                const qrboxFunction = (viewfinderWidth, viewfinderHeight) => {
                    const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                    const size = Math.floor(minEdge * 0.7);
                    return { width: size, height: size };
                };

                return html5Qrcode.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: qrboxFunction },
                    (decodedText) => {
                        // itemId を抽出
                        let itemId = null;
                        try {
                            itemId = new URL(decodedText).searchParams.get("item");
                        } catch (e) {
                            if (decodedText.indexOf('item=') !== -1) {
                                itemId = decodedText.split('item=')[1].split('&')[0];
                            } else {
                                itemId = decodedText.trim();
                            }
                        }

                        if (!itemId) return;

                        // 同一コードの連続検知抑制
                        if (scanCooldown && lastScannedId === itemId) return;

                        lastScannedId = itemId;
                        scanCooldown = true;
                        setTimeout(() => { scanCooldown = false; }, 2000);

                        const resultDiv = document.getElementById('result');

                        if (scannedItems.includes(itemId)) {
                            resultDiv.style.background = '#fef08a';
                            resultDiv.innerText = '⚠️ 既に読み取り済みです: ' + itemId;
                            setTimeout(() => {
                                if (lastScannedId === itemId) {
                                    resultDiv.style.background = '#fff';
                                    resultDiv.innerText = '次のQRコードをかざしてください...';
                                }
                            }, 2500);
                            return;
                        }

                        scannedItems.push(itemId);
                        resultDiv.style.background = '#d1fae5';
                        resultDiv.innerText = '✅ 読み取り成功: ' + itemId;

                        if (window.opener) {
                            window.opener.postMessage(
                                { type: 'QR_SCANNED', itemId: itemId },
                                TARGET_ORIGIN
                            );
                        }

                        setTimeout(() => {
                            if (lastScannedId === itemId) {
                                resultDiv.style.background = '#fff';
                                resultDiv.innerText = '次のQRコードをかざしてください...';
                            }
                        }, 2500);
                    }
                );
            })
            .catch(err => {
                console.error(err);
                document.getElementById('result').style.background = '#fee2e2';
                document.getElementById('result').innerText = '❌ カメラを起動できませんでした。';
            });
    </script>
</body>

</html>
